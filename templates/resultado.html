<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado do Clima</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Resultado do clima</h1>

            {% if clima %}
                <h2>Clima em {{ clima.cidade }}</h2>
                <p class="temperature">{{ clima.temperatura }}°C</p>
                <p>Umidade: {{ clima.umidade }}%</p>
                <p>Condição: {{ clima.descricao }}</p>
            {% else %}
                <p>{{ erro }}</p>
            {% endif %}

            <a href="/">Pesquisar outra cidade</a>
        </section>
    </main>
</body>
</html>
